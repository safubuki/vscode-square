name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build solution
        shell: pwsh
        run: dotnet build .\TurtleAIQuartetHub.sln

      - name: Store readiness check
        shell: pwsh
        run: .\scripts\Test-StoreReadiness.ps1
